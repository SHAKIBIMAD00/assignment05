<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<!-- LOGIN PAGE -->

<div id="login-page">
<div class="login-box">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="70">

<h2>GitHub Issues Tracker</h2>
<p>Sign in to manage your issues</p>

<input type="text" id="user-input" placeholder="Username">
<input type="password" id="pass-input" placeholder="Password">

<button id="login-btn">Sign In</button>

</div>
</div>


<!-- DASHBOARD -->

<div id="dashboard" class="hide">

<header class="navbar">

<div class="nav-left">
<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="30">
<b>GitHub Issues Tracker</b>
</div>

<div class="nav-right">
<input type="text" id="search-box" placeholder="Search issues...">
</div>

</header>


<div class="main-container">


<div class="tab-section">
<button class="tab-btn active" onclick="filterData('all')">All</button>
<button class="tab-btn" onclick="filterData('open')">Open</button>
<button class="tab-btn" onclick="filterData('closed')">Closed</button>
</div>


<div class="status-legend">

<div>
<b id="issue-count">0 Issues</b>
<br>
<span class="small-text">Track and manage your project issues</span>
</div>

<div class="legend-dots">
<span class="dot-open"></span> Open
<span class="dot-closed"></span> Closed
</div>

</div>


<div id="issue-list" class="grid"></div>


</div>

</div>


<!-- POPUP -->

<div id="issue-popup" class="popup hide">

<div class="popup-content">

<h2 id="modal-title"></h2>

<div class="modal-meta">

<span id="modal-status" class="status-btn-modal"></span>

<span id="modal-author-info"></span>

</div>

<div id="modal-tags" class="tag-container"></div>

<p id="modal-desc"></p>

<div class="details-box">

<div>Assignee: <b id="modal-assignee"></b></div>

<div>Priority: <span id="modal-priority"></span></div>

</div>

<button id="close-popup-btn" class="close-btn">Close</button>

</div>

</div>

<script src="index.js"></script>

</body>
</html>
